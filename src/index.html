<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VSDX Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Drop zone */
    #drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      cursor: pointer;
      transition: background 0.2s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      background: #16213e;
    }
    .drop-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.7;
    }
    .drop-text {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .drop-hint {
      font-size: 14px;
      opacity: 0.5;
    }
    #file-input { display: none; }

    /* Viewer layout */
    #viewer {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .toolbar button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a1a5e;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .toolbar button:hover {
      background: #533483;
    }
    .toolbar button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .toolbar button:disabled:hover {
      background: #0f3460;
    }
    #file-name {
      font-size: 14px;
      font-weight: 600;
      margin-left: 8px;
      color: #e94560;
    }
    #zoom-info {
      margin-left: auto;
      font-size: 13px;
      opacity: 0.7;
      min-width: 50px;
      text-align: right;
    }

    /* Page tabs */
    #page-tabs {
      display: flex;
      gap: 0;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .page-tab {
      padding: 8px 20px;
      background: transparent;
      color: #e0e0e0;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .page-tab:hover {
      background: rgba(83, 52, 131, 0.3);
    }
    .page-tab.active {
      border-bottom-color: #e94560;
      color: #e94560;
      font-weight: 600;
    }

    /* Main content area: sidebar + viewport */
    #content-area {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Layers sidebar */
    #layers-sidebar {
      width: 220px;
      min-width: 220px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #layers-sidebar.visible {
      display: flex;
    }
    .sidebar-header {
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8888aa;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .layers-filter {
      padding: 10px 10px 8px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .layers-filter-row {
      display: flex;
      gap: 6px;
    }
    .layers-filter select,
    .layers-filter input {
      min-width: 0;
      background: #0f1730;
      color: #f0f0f5;
      border: 1px solid #0f3460;
      border-radius: 4px;
      font: inherit;
      font-size: 12px;
      height: 28px;
    }
    .layers-filter select {
      flex: 0 0 92px;
      padding: 0 4px;
    }
    .layers-filter input {
      flex: 1;
      padding: 0 8px;
    }
    .layers-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .layers-actions button {
      background: #24345f;
      color: #f0f0f5;
      border: 1px solid #35518c;
      border-radius: 4px;
      height: 26px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
    }
    .layers-actions button:hover {
      background: #304579;
    }
    .layers-actions button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .layers-count {
      color: #8888aa;
      font-size: 11px;
      line-height: 1.2;
    }
    #layers-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      outline: none;
    }
    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
      font-size: 13px;
      outline: none;
    }
    .layer-item:hover {
      background: rgba(83, 52, 131, 0.25);
    }
    .layer-item.focused,
    .layer-item:focus {
      background: rgba(233, 69, 96, 0.18);
      box-shadow: inset 3px 0 0 #e94560;
    }
    .layer-item input[type="checkbox"] {
      accent-color: #e94560;
      width: 15px;
      height: 15px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .layer-item .layer-name {
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .layer-item.disabled .layer-name {
      opacity: 0.4;
      text-decoration: line-through;
    }
    .toolbar button.active {
      background: #533483;
      border-color: #7b52b9;
    }

    .matrix-modal {
      position: fixed;
      inset: 0;
      z-index: 900;
      display: none;
      background: rgba(5, 8, 20, 0.72);
      align-items: flex-start;
      justify-content: center;
      padding: 72px 24px 24px;
    }
    .matrix-modal.visible {
      display: flex;
    }
    .matrix-panel {
      width: min(1040px, 100%);
      max-height: calc(100vh - 96px);
      background: #16213e;
      border: 1px solid #35518c;
      border-radius: 6px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .matrix-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid #0f3460;
    }
    .matrix-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
      justify-content: flex-end;
    }
    .matrix-search {
      width: min(320px, 100%);
      min-width: 180px;
      background: #0f1730;
      color: #f0f0f5;
      border: 1px solid #35518c;
      border-radius: 4px;
      padding: 6px 9px;
      font-size: 12px;
    }
    .matrix-search::placeholder {
      color: #8f9ac3;
    }
    .matrix-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #f0f0f5;
    }
    .matrix-close {
      background: #24345f;
      color: #f0f0f5;
      border: 1px solid #35518c;
      border-radius: 4px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .matrix-body {
      overflow: auto;
    }
    .layer-matrix {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      color: #f0f0f5;
    }
    .layer-matrix th,
    .layer-matrix td {
      border-bottom: 1px solid rgba(53, 81, 140, 0.55);
      padding: 7px 9px;
      text-align: left;
      white-space: nowrap;
    }
    .layer-matrix th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #0f1730;
      color: #b8c0df;
      font-weight: 700;
    }
    .layer-matrix .matrix-layer-name {
      min-width: 180px;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .matrix-yes {
      color: #8be58b;
      font-weight: 700;
    }
    .matrix-no {
      color: #ff8d9c;
      font-weight: 700;
    }
    .matrix-muted {
      color: #8888aa;
    }
    .layer-matrix input[type="checkbox"] {
      accent-color: #e94560;
      width: 15px;
      height: 15px;
      cursor: pointer;
    }
    .layer-matrix .matrix-text-input {
      width: 100%;
      min-width: 180px;
      max-width: 280px;
      padding: 5px 7px;
      border: 1px solid rgba(93, 121, 181, 0.6);
      background: rgba(11, 18, 38, 0.95);
      color: #f0f0f5;
      border-radius: 6px;
      font: inherit;
    }
    .layer-matrix .matrix-text-input:focus {
      outline: none;
      border-color: #e94560;
      box-shadow: 0 0 0 2px rgba(233, 69, 96, 0.18);
    }
    .shape-context-menu {
      position: fixed;
      z-index: 950;
      display: none;
      width: min(360px, calc(100vw - 24px));
      max-height: min(480px, calc(100vh - 24px));
      background: #16213e;
      border: 1px solid #35518c;
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }
    .shape-context-menu.visible {
      display: flex;
      flex-direction: column;
    }
    .shape-context-header {
      padding: 10px 12px 8px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .shape-context-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #f0f0f5;
    }
    .shape-context-subtitle {
      font-size: 12px;
      color: #8f9ac3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .shape-context-search {
      background: #0f1730;
      color: #f0f0f5;
      border: 1px solid #35518c;
      border-radius: 4px;
      padding: 7px 9px;
      font-size: 12px;
    }
    .shape-context-list {
      overflow: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .shape-context-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      background: #1c2a4d;
      color: #f0f0f5;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
      font: inherit;
    }
    .shape-context-item:hover,
    .shape-context-item:focus {
      background: #24345f;
      border-color: #e94560;
      outline: none;
    }
    .shape-context-item.current {
      border-color: #7b52b9;
      background: #21315a;
    }
    .shape-context-item-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .shape-context-item-meta {
      font-size: 11px;
      color: #8f9ac3;
      flex-shrink: 0;
    }
    .shape-context-empty {
      padding: 14px 12px;
      color: #8f9ac3;
      font-size: 12px;
    }

    /* Viewport */
    #viewport {
      flex: 1;
      overflow: hidden;
      cursor: grab;
      background: #2a2a4a;
      /* Checkerboard pattern */
      background-image:
        linear-gradient(45deg, #252545 25%, transparent 25%),
        linear-gradient(-45deg, #252545 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #252545 75%),
        linear-gradient(-45deg, transparent 75%, #252545 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }
    #svg-container {
      transform-origin: 0 0;
      display: inline-block;
    }
    #svg-container svg {
      display: block;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    /* Error */
    #error-box {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #e94560;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="drop-zone">
    <div class="drop-icon">&#128196;</div>
    <div class="drop-text">Drop a .vsd or .vsdx file here</div>
    <div class="drop-hint">or click to browse</div>
  </div>
  <input type="file" id="file-input" accept=".vsd,.vsdx">

  <div id="viewer">
    <div class="toolbar">
      <button id="btn-open">Open</button>
      <span id="file-name"></span>
      <button id="btn-zoom-in">+</button>
      <button id="btn-zoom-out">&minus;</button>
      <button id="btn-zoom-fit">Fit</button>
      <button id="btn-layers">Layers</button>
      <button id="btn-layer-matrix">Layer Matrix</button>
      <button id="btn-remove-non-selected" disabled>Remove Non-selected</button>
      <button id="btn-remove-non-visible" disabled>Remove Non-visible</button>
      <button id="btn-save-vsdx" disabled>Save VSDX</button>
      <button id="btn-export">Export SVG</button>
      <span id="zoom-info">100%</span>
    </div>
    <div id="page-tabs"></div>
    <div id="content-area">
      <div id="layers-sidebar">
        <div class="sidebar-header">Layers</div>
        <div class="layers-filter">
          <div class="layers-filter-row">
            <select id="layer-filter-mode" aria-label="Layer filter mode">
              <option value="contains">Contains</option>
              <option value="starts">Starts with</option>
              <option value="ends">Ends with</option>
              <option value="equals">Equals</option>
              <option value="notContains">Doesn't contain</option>
            </select>
            <input id="layer-filter-text" type="search" placeholder="Search layers" aria-label="Search layers">
          </div>
          <div class="layers-actions">
            <button id="layers-select-all" type="button">Select all</button>
            <button id="layers-deselect-all" type="button">Deselect all</button>
            <button id="layers-select-filtered" type="button">Select filter</button>
            <button id="layers-deselect-filtered" type="button">Deselect filter</button>
          </div>
          <div id="layers-count" class="layers-count"></div>
        </div>
        <div id="layers-list" tabindex="0" role="listbox" aria-label="Layers"></div>
      </div>
      <div id="viewport">
        <div id="svg-container"></div>
      </div>
    </div>
  </div>

    <div id="layer-matrix-modal" class="matrix-modal" role="dialog" aria-modal="true" aria-labelledby="layer-matrix-title">
    <div class="matrix-panel">
      <div class="matrix-header">
        <div id="layer-matrix-title" class="matrix-title">Layer Visibility Matrix</div>
        <div class="matrix-tools">
          <input id="layer-matrix-search" class="matrix-search" type="search" placeholder="Search matrix (Ctrl+F)" aria-label="Search layer matrix">
          <button id="layer-matrix-close" class="matrix-close" type="button" aria-label="Close layer matrix">&times;</button>
        </div>
      </div>
      <div id="layer-matrix-body" class="matrix-body"></div>
    </div>
  </div>

  <div id="error-box"></div>
  <div id="shape-context-menu" class="shape-context-menu">
    <div class="shape-context-header">
      <div class="shape-context-title">Send Shape To Layer</div>
      <div id="shape-context-subtitle" class="shape-context-subtitle"></div>
      <input id="shape-context-search" class="shape-context-search" type="search" placeholder="Filter layers">
    </div>
    <div id="shape-context-list" class="shape-context-list"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
